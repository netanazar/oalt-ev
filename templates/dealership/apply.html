{% extends "base.html" %}
{% block title %}Dealership Application{% endblock %}
{% block content %}
<section class="max-w-3xl mx-auto px-4 py-16">
  <h1 class="text-3xl font-semibold mb-6">Apply for Oalt EV Dealership</h1>
  <form method="post" class="bg-white p-6 rounded-2xl space-y-3">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="w-full bg-slate-900 text-white py-3 rounded-xl">Submit Application</button>
  </form>
</section>
{% endblock %}
